version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urbania-api-app
    restart: unless-stopped
    volumes:
      - .:/var/www
    networks:
      - urbania-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    entrypoint: ["/bin/sh", "/var/www/docker-entrypoint.sh"]

  nginx:
    image: nginx:alpine
    container_name: urbania-api-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - urbania-network
    depends_on:
      - app

  db:
    image: postgres:18.4-alpine
    container_name: urbania-api-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: urbania
      POSTGRES_USER: urbania
      POSTGRES_PASSWORD: urbania_secret
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - urbania-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbania"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urbania-api-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - urbania-network

  mailhog:
    image: mailhog/mailhog
    container_name: urbania-api-mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - urbania-network

networks:
  urbania-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
